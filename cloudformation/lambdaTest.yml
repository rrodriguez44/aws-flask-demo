Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH and access to mysql db
      SecurityGroupIngress:
      - CidrIp: 172.31.0.0/16
        FromPort: 3306
        IpProtocol: tcp
        ToPort: 3306
      - CidrIp: 24.26.206.65/16
        FromPort: 22
        IpProtocol: tcp
        ToPort: 22
      - CidrIp: 24.26.206.65/16
        FromPort: 80
        IpProtocol: tcp
        ToPort: 80
      - CidrIp: 24.26.206.65/16
        FromPort: 3306
        IpProtocol: tcp
        ToPort: 3306

  RDSSetupFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: empAppRdsSetup.py
      Role: arn:aws:iam::793465516547:role/EmpAppRdsSetupLambdaRole
      Code:
        S3Bucket: pcty-lambda-bucket
        S3Key: empAppRdsSetup.zip
      Runtime: python3.9
      Timeout: 900
      TracingConfig:
        Mode: Active
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt EC2SecurityGroup.GroupId
        SubnetIds:
          - subnet-098188ccbe49d334b
          - subnet-0d2b9e63cd65bc742
          - subnet-074c5aa7a556836e7